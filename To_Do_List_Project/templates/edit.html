{% extends "base.html" %}

{% block title %}Edit Todo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-pencil"></i> Edit Todo</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_todo', id=todo.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title *</label>
                        <input type="text" class="form-control" id="title" name="title" 
                               value="{{ todo.title }}" required maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" 
                                  rows="3">{{ todo.description or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="priority" class="form-label">Priority</label>
                        <select class="form-select" id="priority" name="priority">
                            <option value="low" {{ 'selected' if todo.priority == 'low' else '' }}>Low</option>
                            <option value="medium" {{ 'selected' if todo.priority == 'medium' else '' }}>Medium</option>
                            <option value="high" {{ 'selected' if todo.priority == 'high' else '' }}>High</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <div>
                            {% if todo.completed %}
                            <span class="badge bg-success">Completed</span>
                            {% else %}
                            <span class="badge bg-warning text-dark">Active</span>
                            {% endif %}
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-check-lg"></i> Update Todo
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="bi bi-x-lg"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
