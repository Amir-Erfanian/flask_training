{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header">

                <h3>Edit Profile</h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        <input
                            class="form-control"
                            value="{{ current_user.username }}"
                            disabled>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            value="{{ current_user.email }}"
                            required>

                    </div>

                    <button
                        class="btn btn-success">

                        Save Changes

                    </button>

                    <a
                        href="{{ url_for('profile') }}"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
