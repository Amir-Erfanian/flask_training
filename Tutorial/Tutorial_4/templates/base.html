<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}Flask Authentication{% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/">
                Flask Course
            </a>

            <div>

                {% if current_user.is_authenticated %}

                <a class="btn btn-outline-light me-2" href="{{ url_for('dashboard') }}">
                    Dashboard
                </a>

                <a class="btn btn-danger" href="{{ url_for('logout') }}">
                    Logout
                </a>

                {% else %}

                <a class="btn btn-success me-2" href="{{ url_for('login') }}">
                    Login
                </a>

                <a class="btn btn-primary" href="{{ url_for('register') }}">
                    Register
                </a>

                {% endif %}

            </div>

        </div>

    </nav>

    <div class="container mt-4">

        {% with messages = get_flashed_messages() %}

        {% if messages %}

        {% for message in messages %}

        <div class="alert alert-info">

            {{ message }}

        </div>

        {% endfor %}

        {% endif %}

        {% endwith %}

        {% block content %}

        {% endblock %}

    </div>

</body>

</html>
