{% extends "base.html" %}

{% block title %}
Profile
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card">

            <div class="card-header bg-primary text-white">

                <h3>User Profile</h3>

            </div>

            <div class="card-body">
                <div class="text-center mb-4">

                    <img src="https://ui-avatars.com/api/?name={{ user.username }}&size=150" class="rounded-circle">

                </div>
                <table class="table table-bordered">

                    <tr>

                        <th width="30%">User ID</th>

                        <td>{{ user.id }}</td>

                    </tr>

                    <tr>

                        <th>Username</th>

                        <td>{{ user.username }}</td>

                    </tr>

                    <tr>

                        <th>Email</th>

                        <td>{{ user.email }}</td>

                    </tr>

                </table>

                <a class="btn btn-warning" href="{{ url_for('edit_profile') }}">

                    Edit Profile

                </a>

                <a class="btn btn-danger" href="{{ url_for('change_password') }}">

                    Change Password

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
