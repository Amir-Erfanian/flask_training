{% extends "base.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="card">

    <div class="card-header">

        <h2>Dashboard</h2>

    </div>

    <div class="card-body">

        <h3>

            Hello {{ current_user.username }}!

        </h3>

        <p>

            Welcome back.

        </p>

        <hr>

        <table class="table">

            <tr>

                <th>Account ID</th>

                <td>{{ current_user.id }}</td>

            </tr>

            <tr>

                <th>Username</th>

                <td>{{ current_user.username }}</td>

            </tr>

            <tr>

                <th>Email</th>

                <td>{{ current_user.email }}</td>

            </tr>

        </table>

    </div>

</div>

{% endblock %}
