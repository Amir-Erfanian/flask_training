{% extends "base.html" %}

{% block title %}Add Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('students') }}">Students</a></li>
                <li class="breadcrumb-item active">Add</li>
            </ol>
        </nav>

        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">
                    <i class="fas fa-user-plus"></i> Add New Student
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">
                            <i class="fas fa-user"></i> Full Name
                        </label>
                        <input type="text" 
                               class="form-control form-control-lg" 
                               id="name" 
                               name="name" 
                               placeholder="Enter full name"
                               required
                               autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="age" class="form-label fw-bold">
                            <i class="fas fa-calendar"></i> Age
                        </label>
                        <input type="number" 
                               class="form-control form-control-lg" 
                               id="age" 
                               name="age" 
                               placeholder="Enter age"
                               min="1" 
                               max="120"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="major" class="form-label fw-bold">
                            <i class="fas fa-graduation-cap"></i> Major
                        </label>
                        <input type="text" 
                               class="form-control form-control-lg" 
                               id="major" 
                               name="major" 
                               placeholder="Enter major (e.g., Computer Science)"
                               required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-grow-1">
                            <i class="fas fa-plus"></i> Add Student
                        </button>
                        <a href="{{ url_for('students') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
